<!DOCTYPE html>
<html>
<head>
    <title>Symbols</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        input[type='text'] {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            box-sizing: border-box;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <input type="text" id="searchInput" placeholder="Search for symbols by name..." onkeyup="filterSymbols()">
    <div id="symbolsContainer">
        <div class="symbol" data-name="Heart">❤️ Heart</div>
        <div class="symbol hidden" data-name="Communism">☭ Communist Symbol</div>
        <div class="symbol hidden" data-name="Star">⭐ Star</div>
        <div class="symbol hidden" data-name="Military">⚔️ Military Symbol</div>
        <div class="symbol" data-name="Checkmark">✔️ Checkmark</div>
    </div>
    <script>
        function filterSymbols() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            const symbols = document.querySelectorAll('.symbol');

            symbols.forEach(symbol => {
                const name = symbol.getAttribute('data-name').toLowerCase();
                if (name.includes(filter) || (filter === 'communism' && name === 'communism') || (filter === 'military' && name === 'military')) {
                    symbol.classList.remove('hidden');
                } else {
                    symbol.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
